<header id="hero">
  <div class="hero-bg"></div>
  <div class="hero-layout">
    <div class="hero-photo-area">
      <img src="{{ '/assets/images/profile.jpg' | relative_url }}" alt="Relatiecoach Sarah Bracke in Eeklo" class="profile-photo">
    </div>
    <div class="hero-text-area">
      <h1 class="site-title">{{ site.display_name }}</h1>
      <p class="site-description">{{ site.user_title }}</p>
      <p class="site-author">{{ site.username }}</p>
      <div class="header-icons">
        {% if site.email %}
        <a aria-label="E-mail" href="#contact"><i class="icon fa-solid fa-envelope"></i></a>
        {% endif %}
        {% if site.phone %}
        <a aria-label="Telefoon" href="#contact"><i class="icon fa-solid fa-phone"></i></a>
        {% endif %}
        {% if site.instagram_username %}
        <a aria-label="Instagram" href="#contact"><i class="icon fa-brands fa-instagram"></i></a>
        {% endif %}
      </div>
      <a href="#about" class="cta-button">Ontdek meer</a>
    </div>
  </div>
  <a href="#about" class="down" aria-label="Scroll naar beneden">
    <i class="fa-solid fa-chevron-down"></i>
  </a>
</header>
